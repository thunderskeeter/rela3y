services:
  - type: web
    name: relay-dashboard
    env: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /ready
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DEV_MODE
        value: "false"
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAMESITE
        value: Lax
      - key: DATABASE_URL
        fromDatabase:
          name: relay-dashboard-db
          property: connectionString
      - key: AUTH_SECRET
        sync: false
      - key: APP_PUBLIC_BASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: USE_DB_CONTACTS
        value: "true"
      - key: USE_DB_CONVERSATIONS
        value: "true"
      - key: USE_DB_MESSAGES
        value: "true"

databases:
  - name: relay-dashboard-db
    plan: starter
