name: CI

on:
  push:
  pull_request:

jobs:
  backend-frontend-check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: relay_dashboard_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d relay_dashboard_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/relay_dashboard_test
      AUTH_SECRET: ci-auth-secret
      DEV_MODE: "true"
      WEBHOOK_DEV_SECRET: ci-webhook-secret
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm --prefix backend ci

      - name: Secret scan
        run: node scripts/ci/secret-scan.js

      - name: Syntax check backend
        run: |
          node --check backend/server.js
          find backend/src -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Syntax check frontend
        run: |
          find frontend/js -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Run migrations
        run: npm --prefix backend run migrate

      - name: Run backend security integration tests
        run: npm --prefix backend test
